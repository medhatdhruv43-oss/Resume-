<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECE Portfolio – Dhruvkumar Medhat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#0a1628;color:#fff;overflow-x:hidden;}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 3rem;
  background:rgba(10,22,40,0);
  transition:background 0.4s,backdrop-filter 0.4s,padding 0.4s;
}
nav.scrolled{
  background:rgba(10,22,40,0.55);
  backdrop-filter:blur(18px);
  padding:0.8rem 3rem;
  border-bottom:1px solid rgba(255,255,255,0.10);
}
.nav-brand{
  display:flex;flex-direction:column;gap:2px;text-decoration:none;
}
.nav-brand-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.06em;color:#fff;font-weight:400;}
.nav-brand-id{font-size:0.65rem;font-weight:500;letter-spacing:0.14em;color:rgba(255,255,255,0.45);text-transform:uppercase;}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{font-size:0.75rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);text-decoration:none;transition:color 0.3s;}
.nav-links a:hover,.nav-links a.active{color:#fff;}

/* ── HERO ── */
.hero{
  position:relative;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:-15%;
  background:url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAASABIAAD/4QBMRXhpZgAATU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAFoKADAAQAAAABAAAEOAAAAAD/7QA4UGhvdG9zaG9wIDMuMAA4Qkl[...]
  will-change:transform;
  filter:brightness(0.65) saturate(1.2);
}
.hero-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,22,40,0.25) 0%,rgba(10,22,40,0.15) 50%,rgba(10,22,40,0.85) 100%);
}
.hero-content{
  position:relative;z-index:2;text-align:center;padding:0 2rem;max-width:960px;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:0.5rem;
  font-size:0.72rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
  color:#fff;background:rgba(255,255,255,0.18);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.3);padding:0.45rem 1.3rem;border-radius:99px;
  margin-bottom:2rem;
}
.hero-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1rem,2vw,1.4rem);font-weight:300;font-style:italic;
  color:rgba(255,255,255,0.75);letter-spacing:0.05em;margin-bottom:1rem;
}
.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3.2rem,7.5vw,6.5rem);font-weight:300;line-height:1.05;
  color:#fff;margin-bottom:1.5rem;letter-spacing:-0.01em;text-shadow:0 2px 30px rgba(0,0,0,0.5);
}
.hero-title em{font-style:italic;color:#a8d8ea;}
.hero-sub{
  font-size:clamp(0.95rem,1.4vw,1.15rem);font-weight:300;
  color:rgba(255,255,255,0.80);max-width:52ch;margin:0 auto 2.5rem;line-height:1.75;
  text-shadow:0 1px 10px rgba(0,0,0,0.4);
}
.hero-student-card{
  display:inline-flex;align-items:center;gap:1rem;
  background:rgba(255,255,255,0.12);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.22);border-radius:1rem;
  padding:0.8rem 1.6rem;margin-bottom:2.5rem;
}
.hero-student-card span{font-size:0.8rem;color:rgba(255,255,255,0.7);}
.hero-student-card b{color:#fff;font-weight:600;}
.scroll-cue{
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  color:rgba(255,255,255,0.45);font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;
  animation:float 2.5s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

/* ── PARALLAX SECTIONS ── */
.par-section{
  position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;
}
.par-bg{
  position:absolute;inset:-15%;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  will-change:transform;
}
.par-content{position:relative;z-index:2;width:100%;}

/* ── PREFACE ── */
.preface-bg{background-image:url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAASABIAAD/4QBMRXhpZgAATU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAFoKADAAQAAAABAAAEOAAAAAD/7QA4UGhvdG9[...]
